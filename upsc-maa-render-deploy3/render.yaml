# render.yaml — Render Blueprint
# ════════════════════════════════════════════════════════════
# UPSC Maa — One-click deploy on render.com
# Uses Node runtime (NOT Docker) — simpler and faster on Render
# Docs: https://render.com/docs/blueprint-spec
# ════════════════════════════════════════════════════════════

services:
  - type: web
    name: upsc-maa-app
    runtime: node              # Node.js runtime (no Docker needed)
    region: singapore          # Closest to India for low latency
    plan: free                 # Free tier — upgrade to starter ($7/mo) for no sleep
    rootDir: backend           # All commands run inside /backend
    buildCommand: npm ci --only=production
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true           # Auto-redeploy on every git push to main

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false            # Paste your MongoDB Atlas URI in Render dashboard
      - key: JWT_SECRET
        generateValue: true    # Render generates a secure random value automatically
      - key: JWT_EXPIRE
        value: 30d
      - key: ANTHROPIC_API_KEY
        sync: false            # Paste your Anthropic API key in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false            # Paste your Render URL: https://upsc-maa-app.onrender.com
      - key: VAPID_PUBLIC_KEY
        sync: false            # Optional: for push notifications
      - key: VAPID_PRIVATE_KEY
        sync: false            # Optional: for push notifications
      - key: VAPID_EMAIL
        value: mailto:admin@upsemaa.com
